name: Deploy University

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          # IMPORTANT: SSH_HOST must be the server's raw IP (or a DNS record that is
          # NOT proxied through Cloudflare). Cloudflare does not proxy port 22, so a
          # proxied hostname makes the runner hang with "dial tcp ...:22: i/o timeout".
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd /EduBridge_University_1.0.0
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            echo "Waiting for app to be ready..."
            for i in $(seq 1 20); do
              if docker exec edubridge_app curl -fsS -m 5 http://localhost:8000/health > /dev/null 2>&1; then
                echo "App is healthy"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "App did not become healthy in time"
                docker logs --tail 50 edubridge_app
                exit 1
              fi
              echo "Attempt $i/20, retrying in 5s..."
              sleep 5
            done
            docker exec edubridge_app alembic upgrade head
